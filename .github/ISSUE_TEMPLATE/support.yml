name: Support question
description: Ask for help with installation, validation, or release usage
title: "support: "
labels: [support]
body:
  - type: markdown
    attributes:
      value: |
        Please run `bash scripts/doctor.sh` or `bash scripts/doctor.sh --offline` before opening support requests when possible.
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Commands tried
      description: Include exact commands and flags.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS version, architecture, WSL/container status, and network constraints.
