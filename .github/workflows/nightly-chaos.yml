name: nightly-chaos
on:
  schedule: [{ cron: '0 2 * * *' }]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run: { shell: bash }
jobs:
  chaos:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, persist-credentials: false }
      - run: |
          set -Eeuo pipefail
          seed=20260509
          echo "Chaos deterministic seed=$seed"
          python - <<'PY'
import random
random.seed(20260509)
print('chaos-seq', [random.randint(1,100) for _ in range(5)])
PY
      - if: failure()
        uses: actions/upload-artifact@v4
        with: { name: nightly-chaos-debug-${{ github.run_id }}, path: ./**/*.log, if-no-files-found: ignore }
