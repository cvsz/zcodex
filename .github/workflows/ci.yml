name: ci

on:
  push:
    branches:
      - main
      - develop
      - 'codex/**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CACHE_VERSION: v2
      NODE_VERSION: '22.15.0'
      PYTHON_VERSION: '3.12'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          if [ -f package-lock.json ]; then npm ci --ignore-scripts; fi
          if [ -f requirements.txt ]; then python -m pip install --upgrade pip && pip install -r requirements.txt; fi

      - name: Lint and typecheck
        run: |
          set -Eeuo pipefail
          npm run lint --if-present
          npm run typecheck --if-present
          if command -v ruff >/dev/null; then ruff check .; fi

      - name: Unit tests
        run: |
          set -Eeuo pipefail
          npm test --if-present
          if command -v pytest >/dev/null; then pytest -q; fi

      - name: Build
        run: |
          set -Eeuo pipefail
          npm run build --if-present

      - name: Workflow summary
        if: always()
        run: |
          set -Eeuo pipefail
          {
            echo "## CI summary"
            echo "- Ref: ${GITHUB_REF}"
            echo "- SHA: ${GITHUB_SHA}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-debug-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            ./**/*.log
            coverage/
            .codex/reports/
