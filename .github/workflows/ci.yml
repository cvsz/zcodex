name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  TZ: UTC
  DEBIAN_FRONTEND: noninteractive

jobs:
  doctor:
    name: Doctor CI observability
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Install tooling
        run: |
          set -Eeuo pipefail

          sudo apt-get update -o Acquire::Retries=3

          sudo apt-get install -y \
            bash \
            git \
            curl \
            shellcheck \
            shfmt \
            bats \
            tar \
            gzip \
            coreutils \
            make \
            python3

      - name: Run doctor
        run: |
          set -Eeuo pipefail

          mkdir -p .doctor

          if [[ -f scripts/doctor-ci.sh ]]; then
            bash scripts/doctor-ci.sh | tee .doctor/doctor.log
          else
            bash scripts/doctor.sh | tee .doctor/doctor.log
          fi

          if [[ ! -s .doctor/doctor.log ]]; then
            echo "doctor produced no output" > .doctor/doctor.log
          fi

      - name: Upload reports
        if: always() && hashFiles('.doctor/**') != ''
        uses: actions/upload-artifact@v5
        with:
          name: doctor-${{ github.run_id }}-${{ github.run_attempt }}
          path: .doctor/
          if-no-files-found: warn

  bats:
    name: bats / ubuntu-${{ matrix.ubuntu }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu: "22.04"
            arch: amd64
            runner: ubuntu-22.04

          - ubuntu: "24.04"
            arch: amd64
            runner: ubuntu-24.04

          - ubuntu: "24.04"
            arch: arm64
            runner: ubuntu-24.04-arm64

    steps:
      - uses: actions/checkout@v5

      - name: Configure isolated workspace
        run: |
          set -Eeuo pipefail

          mkdir -p \
            "${RUNNER_TEMP}/zcodex-tmp" \
            "${RUNNER_TEMP}/zcodex-home"

          {
            echo "TMPDIR=${RUNNER_TEMP}/zcodex-tmp"
            echo "HOME=${RUNNER_TEMP}/zcodex-home"
            echo "XDG_CACHE_HOME=${RUNNER_TEMP}/zcodex-home/.cache"
            echo "XDG_CONFIG_HOME=${RUNNER_TEMP}/zcodex-home/.config"
            echo "XDG_DATA_HOME=${RUNNER_TEMP}/zcodex-home/.local/share"
            echo "XDG_STATE_HOME=${RUNNER_TEMP}/zcodex-home/.local/state"
            echo "npm_config_cache=${RUNNER_TEMP}/zcodex-home/.npm-cache"
            echo "NPM_CONFIG_CACHE=${RUNNER_TEMP}/zcodex-home/.npm-cache"
            echo "npm_config_prefix=${RUNNER_TEMP}/zcodex-home/.npm-prefix"
            echo "NPM_CONFIG_PREFIX=${RUNNER_TEMP}/zcodex-home/.npm-prefix"
          } >> "${GITHUB_ENV}"

      - name: Install validation tools
        run: |
          set -Eeuo pipefail

          sudo apt-get update -o Acquire::Retries=3

          sudo apt-get install -y \
            bash \
            git \
            curl \
            shellcheck \
            shfmt \
            bats \
            tar \
            coreutils \
            make \
            gzip \
            python3 \
            python3-tomli

      - name: Validate dependency versions
        run: |
          set -Eeuo pipefail

          bash --version | head -1
          git --version
          shellcheck --version
          shfmt --version
          bats --version
          tar --version | head -1
          gzip --version | head -1
          python3 --version

          if grep -q "^validate-env:" Makefile; then
            make validate-env
          else
            bash scripts/validate-environment.sh
          fi

      - name: Bash syntax checks
        run: |
          set -Eeuo pipefail
          bash -n codex.sh scripts/*.sh scripts/lib/*.sh tests/*.sh tests/helpers/*.bash

      - name: Run shellcheck
        run: make lint

      - name: Check formatting
        run: make fmt-check

      - name: Workflow policy
        run: make workflow-policy

      - name: Run tests
        run: make test

      - name: Validate E2E plan
        run: make e2e-dry-run

      - name: Upload diagnostics
        if: failure()
        run: bash scripts/diagnostics.sh

      - name: Publish diagnostics
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: diagnostics-${{ matrix.ubuntu }}-${{ matrix.arch }}
          path: diagnostics/
          if-no-files-found: ignore

  release-reproducibility:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install tooling
        run: |
          set -Eeuo pipefail

          sudo apt-get update -o Acquire::Retries=3

          sudo apt-get install -y \
            bash \
            git \
            curl \
            tar \
            gzip \
            coreutils \
            make

      - name: Build release twice
        run: |
          set -Eeuo pipefail

          scripts/build-release.sh --output-dir dist-a
          scripts/build-release.sh --output-dir dist-b

          version="$(tr -d '\n\r' < VERSION)"

          cmp \
            "dist-a/zcodex-v${version}.tar.gz" \
            "dist-b/zcodex-v${version}.tar.gz"

      - name: Verify checksums
        run: |
          set -Eeuo pipefail
          scripts/verify-release-artifacts.sh dist-a

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-dry-run
          path: dist-a/

  security-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .

      - name: Security summary
        if: always()
        run: |
          {
            echo "## CI security audit"
            echo "- Gitleaks and Trivy executed."
            echo "- Security findings are uploaded in job artifacts/SARIF workflows."
          } >> "$GITHUB_STEP_SUMMARY"
          severity: HIGH,CRITICAL
          exit-code: "1"
