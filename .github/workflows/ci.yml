name: ci

on:
  push:
    branches: [main, develop, 'codex/**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CACHE_VERSION: v3
      NODE_VERSION: '22.15.0'
      PYTHON_VERSION: '3.12'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, persist-credentials: false }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}-v3
          restore-keys: |
            ${{ runner.os }}-npm-
      - uses: actions/setup-python@v5
        with: { python-version: ${{ env.PYTHON_VERSION }} }
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-
      - name: Deterministic install
        run: |
          set -Eeuo pipefail
          if [ -f package-lock.json ]; then npm ci --ignore-scripts; fi
          if [ -f requirements.txt ]; then python -m pip install --upgrade pip && pip install --requirement requirements.txt; fi
      - name: Lint test build
        run: |
          set -Eeuo pipefail
          npm run lint --if-present
          npm run typecheck --if-present
          npm test --if-present
          if command -v pytest >/dev/null; then pytest -q; fi
          npm run build --if-present
      - name: Artifact reproducibility precheck
        run: |
          set -Eeuo pipefail
          mkdir -p artifacts
          git rev-parse HEAD > artifacts/commit.txt
      - uses: actions/upload-artifact@v4
        with:
          name: ci-metadata-${{ github.sha }}
          path: artifacts/
          if-no-files-found: error
      - name: Summary
        if: always()
        run: |
          set -Eeuo pipefail
          {
            echo "## CI Summary"
            echo "- Ref: ${GITHUB_REF}"
            echo "- SHA: ${GITHUB_SHA}"
            echo "- Cache version: ${CACHE_VERSION}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-debug-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            ./**/*.log
            ./**/junit*.xml
            .codex/reports/
