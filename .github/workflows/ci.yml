name: ci

on:
  push:
    branches:
      - main
      - develop
      - "codex/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          set -euxo pipefail
          if [ -f package.json ]; then
            npm ci || npm install
          fi
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Lint
        run: |
          set -euxo pipefail
          npm run lint --if-present
          ruff check . || true

      - name: Type check
        run: |
          set -euxo pipefail
          npm run typecheck --if-present
          mypy . || true

      - name: Unit tests
        run: |
          set -euxo pipefail
          npm test --if-present
          pytest || true

      - name: Build
        run: |
          set -euxo pipefail
          npm run build --if-present

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: |
            coverage/
            .codex/reports/
