name: ci

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  TZ: UTC

jobs:
  bats:
    name: bats / ubuntu-${{ matrix.ubuntu }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu: '22.04'
            arch: amd64
            runner: ubuntu-22.04
          - ubuntu: '24.04'
            arch: amd64
            runner: ubuntu-24.04
          - ubuntu: '24.04'
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Configure isolated test workspace
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/zcodex-tmp" "${RUNNER_TEMP}/zcodex-home"
          echo "TMPDIR=${RUNNER_TEMP}/zcodex-tmp" >>"${GITHUB_ENV}"
          echo "HOME=${RUNNER_TEMP}/zcodex-home" >>"${GITHUB_ENV}"
          echo "XDG_CACHE_HOME=${RUNNER_TEMP}/zcodex-home/.cache" >>"${GITHUB_ENV}"
          echo "XDG_CONFIG_HOME=${RUNNER_TEMP}/zcodex-home/.config" >>"${GITHUB_ENV}"
          echo "XDG_DATA_HOME=${RUNNER_TEMP}/zcodex-home/.local/share" >>"${GITHUB_ENV}"
          echo "XDG_STATE_HOME=${RUNNER_TEMP}/zcodex-home/.local/state" >>"${GITHUB_ENV}"
          echo "npm_config_cache=${RUNNER_TEMP}/zcodex-home/.npm-cache" >>"${GITHUB_ENV}"
          echo "NPM_CONFIG_CACHE=${RUNNER_TEMP}/zcodex-home/.npm-cache" >>"${GITHUB_ENV}"
          echo "npm_config_prefix=${RUNNER_TEMP}/zcodex-home/.npm-prefix" >>"${GITHUB_ENV}"
          echo "NPM_CONFIG_PREFIX=${RUNNER_TEMP}/zcodex-home/.npm-prefix" >>"${GITHUB_ENV}"
      - name: Install validation tools
        # Install Bats from Ubuntu packages instead of a helper-library setup
        # action so CI does not restore unused third-party helper caches.
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y bash git curl shellcheck shfmt bats tar coreutils make gzip python3 python3-tomli && break
            if [[ "${attempt}" -eq 3 ]]; then
              exit 1
            fi
            sleep $((attempt * 5))
          done
      - name: Validate dependency versions
        run: |
          set -euo pipefail
          bash --version | head -1
          git --version
          shellcheck --version
          shfmt --version
          bats --version
          tar --version | head -1
          gzip --version | head -1
          python3 --version
          make validate-env
      - name: Bash syntax checks
        run: bash -n codex.sh scripts/*.sh scripts/lib/*.sh tests/*.sh tests/helpers/*.bash
      - name: Run shellcheck
        run: make lint
      - name: Check shell formatting
        run: make fmt-check
      - name: Enforce workflow dependency policy
        run: make workflow-policy
      - name: Run Bats tests
        run: make test
      - name: Validate E2E plan
        run: make e2e-dry-run
      - name: Upload diagnostics on failure
        if: failure()
        run: scripts/diagnostics.sh
      - name: Publish diagnostic bundle
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-diagnostics-${{ matrix.ubuntu }}-${{ matrix.arch }}
          path: diagnostics/
          if-no-files-found: ignore
  release-reproducibility:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure isolated release workspace
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/zcodex-release-tmp" "${RUNNER_TEMP}/zcodex-release-home"
          echo "TMPDIR=${RUNNER_TEMP}/zcodex-release-tmp" >>"${GITHUB_ENV}"
          echo "HOME=${RUNNER_TEMP}/zcodex-release-home" >>"${GITHUB_ENV}"
          echo "XDG_CACHE_HOME=${RUNNER_TEMP}/zcodex-release-home/.cache" >>"${GITHUB_ENV}"
          echo "XDG_CONFIG_HOME=${RUNNER_TEMP}/zcodex-release-home/.config" >>"${GITHUB_ENV}"
          echo "XDG_DATA_HOME=${RUNNER_TEMP}/zcodex-release-home/.local/share" >>"${GITHUB_ENV}"
          echo "XDG_STATE_HOME=${RUNNER_TEMP}/zcodex-release-home/.local/state" >>"${GITHUB_ENV}"
          echo "npm_config_cache=${RUNNER_TEMP}/zcodex-release-home/.npm-cache" >>"${GITHUB_ENV}"
          echo "NPM_CONFIG_CACHE=${RUNNER_TEMP}/zcodex-release-home/.npm-cache" >>"${GITHUB_ENV}"
          echo "npm_config_prefix=${RUNNER_TEMP}/zcodex-release-home/.npm-prefix" >>"${GITHUB_ENV}"
          echo "NPM_CONFIG_PREFIX=${RUNNER_TEMP}/zcodex-release-home/.npm-prefix" >>"${GITHUB_ENV}"
      - name: Install release validation tools
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y bash git curl shellcheck shfmt bats tar coreutils make gzip python3 python3-tomli && break
            if [[ "${attempt}" -eq 3 ]]; then
              exit 1
            fi
            sleep $((attempt * 5))
          done
      - name: Validate release tooling
        run: make validate-env
      - name: Build reproducible release twice
        run: |
          set -euo pipefail
          scripts/release.sh --output-dir dist
          scripts/build-release.sh --output-dir dist.repro
          version="$(tr -d '[:space:]' < VERSION)"
          cmp "dist/zcodex-v${version}.tar.gz" "dist.repro/zcodex-v${version}.tar.gz"
      - name: Verify checksums
        run: cd dist && sha256sum -c SHA256SUMS
      - name: Upload release dry-run artifacts
        uses: actions/upload-artifact@v7
        with:
          name: zcodex-release-dry-run
          path: dist/

  security-audit:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
