name: installer-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bats
        uses: bats-core/bats-action@3.0.1
      - name: Bash syntax checks
        run: bash -n scripts/*.sh scripts/lib/*.sh tests/*.sh
      - name: Run tests
        run: bats tests
      - name: Installer dry run
        run: CI=true bash scripts/install-codex-ubuntu.sh --dry-run --skip-docker --skip-optional
