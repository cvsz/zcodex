name: installer-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  bats:
    name: bats / ubuntu-${{ matrix.ubuntu }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu: '22.04'
            arch: amd64
            runner: ubuntu-22.04
          - ubuntu: '24.04'
            arch: amd64
            runner: ubuntu-24.04
          - ubuntu: '24.04'
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install -y bash git curl shellcheck shfmt bats tar coreutils make gzip python3 python3-tomli
      - name: Validate environment
        run: make validate-env
      - name: Bash syntax checks
        run: bash -n scripts/*.sh scripts/lib/*.sh tests/*.sh
      - name: Run tests
        run: bats tests
      - name: Installer dry run
        run: CI=true bash scripts/install-codex-ubuntu.sh --dry-run --skip-docker --skip-optional

  release-reproducibility:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install release validation tools
        run: sudo apt-get update && sudo apt-get install -y bash git curl shellcheck shfmt bats tar coreutils make gzip python3
      - name: Validate and build reproducible release
        run: scripts/release.sh
      - name: Verify checksums
        run: cd dist && sha256sum -c SHA256SUMS
      - name: Upload release dry-run artifacts
        uses: actions/upload-artifact@v7
        with:
          name: zcodex-release-dry-run
          path: dist/
