name: ci-self-healing
on:
  workflow_run:
    workflows: [ci]
    types: [completed]
permissions:
  contents: read
  actions: read
  issues: write
concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true
defaults:
  run: { shell: bash }
jobs:
  analyze:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.actor.login != 'github-actions[bot]' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Detect recursive self-healing storm and unstable retries
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.payload.workflow_run.head_branch;
            const workflow_id = context.payload.workflow_run.workflow_id;
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner, repo, workflow_id, branch, per_page: 50
            });
            const failedRecent = runs.filter(r => r.conclusion === 'failure').slice(0, 10);
            core.info(`Recent failures on ${branch}: ${failedRecent.length}`);
            if (failedRecent.length >= 5) core.setFailed('Detected unstable retry storm (>=5 failures in recent runs).');
            const inProgress = runs.filter(r => r.status !== 'completed').length;
            if (inProgress >= 3) core.setFailed('Detected workflow storm (>=3 in-progress runs for same workflow and branch).');
      - name: Capture forensic metadata
        run: |
          set -Eeuo pipefail
          mkdir -p logs
          {
            echo "run_id=${{ github.event.workflow_run.id }}"
            echo "workflow=${{ github.event.workflow_run.name }}"
            echo "conclusion=${{ github.event.workflow_run.conclusion }}"
            echo "head_sha=${{ github.event.workflow_run.head_sha }}"
            echo "head_branch=${{ github.event.workflow_run.head_branch }}"
          } | tee logs/self-healing.txt
      - if: always()
        uses: actions/upload-artifact@v4
        with: { name: self-healing-debug-${{ github.run_id }}, path: logs/, if-no-files-found: error }
