name: e2e

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Run e2e
        run: |
          set -euxo pipefail
          if [ -x scripts/e2e-runner.sh ]; then
            scripts/e2e-runner.sh
          else
            echo "No e2e runner found; skipping."
          fi
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: |
            diagnostics/
            .codex/reports/
