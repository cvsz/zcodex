name: e2e
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash
jobs:
  e2e:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0, persist-credentials: false}
      - name: Run e2e
        run: |
          set -Eeuo pipefail
          if [ -x scripts/e2e-runner.sh ]; then scripts/e2e-runner.sh; else echo 'No e2e runner found'; fi
      - name: Validate outputs
        run: |
          set -Eeuo pipefail
          test -d . || exit 1
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-debug-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            ./**/*.log
            diagnostics/
            .codex/reports/
