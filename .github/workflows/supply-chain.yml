name: Supply Chain Security (Level 2 Hardened)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SYFT_VERSION: "latest"
  COSIGN_EXPERIMENTAL: "1"

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          output-file: sbom.spdx.json

      - name: Verify SBOM exists
        run: test -s sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  signing:
    runs-on: ubuntu-latest
    needs: sbom
    steps:
      - uses: actions/checkout@v4

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom

      - name: Install Cosign
        run: |
          curl -sSfL https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o cosign
          chmod +x cosign
          sudo mv cosign /usr/local/bin/

      - name: Sign SBOM (keyless)
        run: |
          cosign sign-blob --yes sbom.spdx.json --output-signature sbom.sig

      - name: Upload Signature
        uses: actions/upload-artifact@v4
        with:
          name: sbom-signature
          path: sbom.sig

  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review (Supply Chain Gate)
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  provenance:
    runs-on: ubuntu-latest
    needs: sbom
    steps:
      - uses: actions/checkout@v4

      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: sbom.spdx.json

      - name: Summary
        if: always()
        run: |
          echo "## Level 2 Supply Chain Security Enabled" >> $GITHUB_STEP_SUMMARY
          echo "- SBOM generated (SPDX)" >> $GITHUB_STEP_SUMMARY
          echo "- Cosign signing enabled" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency review enforced" >> $GITHUB_STEP_SUMMARY
          echo "- Provenance attestation enabled" >> $GITHUB_STEP_SUMMARY
