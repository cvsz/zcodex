name: release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  TZ: UTC

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Publish tagged release
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CODEX_RELEASE_LOG: ${{ github.workspace }}/codex_release.log
      ZCODEX_RELEASE_LOG: ${{ github.workspace }}/codex_release.log
      STRICT: '1'

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure isolated release workspace
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/zcodex-release-tmp" "${RUNNER_TEMP}/zcodex-home"
          echo "TMPDIR=${RUNNER_TEMP}/zcodex-release-tmp" >>"${GITHUB_ENV}"
          echo "HOME=${RUNNER_TEMP}/zcodex-home" >>"${GITHUB_ENV}"
          echo "XDG_CACHE_HOME=${RUNNER_TEMP}/zcodex-home/.cache" >>"${GITHUB_ENV}"
          echo "XDG_CONFIG_HOME=${RUNNER_TEMP}/zcodex-home/.config" >>"${GITHUB_ENV}"
          echo "XDG_DATA_HOME=${RUNNER_TEMP}/zcodex-home/.local/share" >>"${GITHUB_ENV}"
          echo "XDG_STATE_HOME=${RUNNER_TEMP}/zcodex-home/.local/state" >>"${GITHUB_ENV}"
          echo "npm_config_cache=${RUNNER_TEMP}/zcodex-home/.npm-cache" >>"${GITHUB_ENV}"
          echo "NPM_CONFIG_CACHE=${RUNNER_TEMP}/zcodex-home/.npm-cache" >>"${GITHUB_ENV}"
          echo "npm_config_prefix=${RUNNER_TEMP}/zcodex-home/.npm-prefix" >>"${GITHUB_ENV}"
          echo "NPM_CONFIG_PREFIX=${RUNNER_TEMP}/zcodex-home/.npm-prefix" >>"${GITHUB_ENV}"

      - name: Install release validation tools
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if sudo apt-get update && sudo apt-get install -y bash git curl shellcheck shfmt bats tar coreutils make gzip python3 python3-tomli; then
              break
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Validate release runtime environment
        run: |
          set -euo pipefail
          echo "[Codex] Validating environment..." | tee -a "${CODEX_RELEASE_LOG}"
          command -v bash >/dev/null 2>&1 || { echo "bash not installed. Aborting." >&2; exit 1; }
          command -v git >/dev/null 2>&1 || { echo "git not installed. Aborting." >&2; exit 1; }
          command -v curl >/dev/null 2>&1 || { echo "curl not installed. Aborting." >&2; exit 1; }
          if command -v docker >/dev/null 2>&1; then
            docker --version | tee -a "${CODEX_RELEASE_LOG}"
          else
            echo "[Codex] Docker not found; dry-run release validation does not require host Docker." | tee -a "${CODEX_RELEASE_LOG}"
          fi
          if command -v node >/dev/null 2>&1; then
            node --version | tee -a "${CODEX_RELEASE_LOG}"
          else
            echo "[Codex] Node.js not found; installer dry-run owns runtime validation." | tee -a "${CODEX_RELEASE_LOG}"
          fi
          command -v kubectl >/dev/null 2>&1 || echo "[Codex] Kubernetes not found; cluster orchestration checks are not required for release packaging." | tee -a "${CODEX_RELEASE_LOG}"

      - name: Validate tag and VERSION
        run: scripts/validate-release.sh "${GITHUB_REF_NAME}"

      - name: Validate environment, shellcheck, shfmt, and Bats
        run: make validate

      - name: Run Codex release orchestrator
        run: |
          set -euo pipefail
          echo "[Codex] Running tagged release validation..." | tee -a "${CODEX_RELEASE_LOG}"
          CI=true ./codex.sh release --dry-run --skip-docker --skip-optional
          echo "[Codex] Process finished successfully." | tee -a "${CODEX_RELEASE_LOG}"

      - name: Build deterministic release artifacts
        run: scripts/build-release.sh --ref "${GITHUB_REF_NAME}"

      - name: Gate release reproducibility
        run: |
          set -euo pipefail
          rm -rf dist.repro
          scripts/build-release.sh --ref "${GITHUB_REF_NAME}" --output-dir dist.repro
          version="$(tr -d '[:space:]' < VERSION)"
          cmp "dist/zcodex-v${version}.tar.gz" "dist.repro/zcodex-v${version}.tar.gz"

      - name: Verify artifact checksums
        run: cd dist && sha256sum -c SHA256SUMS

      - name: Upload release artifacts and logs
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-${{ github.ref_name }}
          path: |
            codex_release.log
            dist/
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: zcodex ${{ github.ref_name }} — Secure Ubuntu Bootstrap Runtime
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/zcodex-${{ github.ref_name }}.tar.gz
            dist/SHA256SUMS
            dist/SIGNING_INSTRUCTIONS.md

      # Future hardening hooks:
      # - Generate SBOM: syft dist/zcodex-${{ github.ref_name }}.tar.gz -o spdx-json > dist/zcodex-${{ github.ref_name }}.spdx.json
      # - Sign checksums with GPG: gpg --armor --detach-sign dist/SHA256SUMS
      # - Sign checksums with cosign keyless: cosign sign-blob --yes --output-signature dist/SHA256SUMS.sig dist/SHA256SUMS
