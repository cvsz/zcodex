name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Build release
        run: |
          set -euxo pipefail
          npm ci || true
          npm run build --if-present
      - name: Package
        run: |
          set -euxo pipefail
          mkdir -p dist
          tar -czf dist/release.tar.gz .
      - name: Validate artifact
        run: |
          set -euxo pipefail
          test -f dist/release.tar.gz
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: dist/release.tar.gz
