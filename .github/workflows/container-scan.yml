name: container-scan

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  trivy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          set -euxo pipefail
          docker build -t zcodex:test .
      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: zcodex:test
